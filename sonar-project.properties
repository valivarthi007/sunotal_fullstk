sonar.projectKey=sunotal-jcs-raju
sonar.projectName=sunotal jcs application
sonar.projectVersion=1.0

# Point to your source directories (Adjust if your folder names differ)
sonar.sources=backend/src,frontend/src

# Exclusions to prevent performance issues and skewed metrics
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,server/migrations/**,**/*.spec.js,**/*.test.js

# Language configuration
sonar.sourceEncoding=UTF-8
sonar.javascript.environments=browser,nodejs