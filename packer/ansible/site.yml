---
- name: Harden Ubuntu image and serve the Sunotal frontend
  hosts: all
  become: true
  vars:
    app_dir: /var/www/sunotal
    repo_dir: "{{ workspace | default('/tmp/sunotal') }}"
    frontend_dist_dir: "{{ repo_dir }}/frontend-dist"
    benchmark:
        name: "{{ 'CIS Amazon Web Services Foundations Benchmark' | replace(' ','_') }}"
        version: 1.4.0
        profile: "{{ }}"
  collections:
    - azure.azcollection
    - ansible.posix
  roles:
    - role: "{{ playbook_dir }}"
      system_is_container: "{{ is_container | default(false) }}"
  tasks:
    - name: Install system packages
      apt:
        name:
          - nginx
          - ufw
          - auditd
          - curl
          - git
          - ca-certificates
          - gnupg
          - lsb-release
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Add NodeSource apt repository
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Install pnpm globally
      shell: npm install -g pnpm@9
      args:
        creates: /usr/bin/pnpm

    - name: Install pm2 globally
      shell: npm install -g pm2
      args:
        creates: /usr/bin/pm2

    - name: Ensure application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: www-data
        mode: "0775"

    - name: Ensure backend application directory exists
      file:
        path: "/var/www/sunotal-backend"
        state: directory
        owner: ubuntu
        group: www-data
        mode: "0775"

    - name: Configure nginx site
      copy:
        dest: /etc/nginx/sites-available/sunotal
        content: |
          server {
            listen 80 default_server;
            listen [::]:80 default_server;
            server_name _;
            root /var/www/sunotal;
            index index.html;

            location /api/ {
              proxy_pass http://127.0.0.1:5000/;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host $host;
              proxy_cache_bypass $http_upgrade;
            }

            location / {
              try_files $uri $uri/ /index.html;
            }

            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
          }

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/sunotal
        dest: /etc/nginx/sites-enabled/sunotal
        state: link

    - name: Harden SSH configuration
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^(#)?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^(#)?PermitRootLogin', line: 'PermitRootLogin no' }

    - name: Allow SSH and web traffic
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"
        - "5000"
        - "5432"

    - name: Enable firewall
      ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Ensure services are started and enabled
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - nginx
        - ssh
        - auditd
        - docker
