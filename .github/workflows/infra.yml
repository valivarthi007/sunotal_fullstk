name: Create infrastructure

on:
  push:
    branches:
    - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup `packer`
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: "latest"

      - name: build ami image
        run: |
          cd packer
          packer init .
          packer build .
          AMI_ID=$(grep -o '"artifact_id": *"[^"]*"' packer-manifest.json | tail -n1 | cut -d '"' -f4 | cut -d ':' -f2)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT

      - name: Setup `terraform`
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.6

      - name: Create infrastructure with above ami image
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve 
        env:
          TF_VAR_AMI_ID: ${{ steps.packer_build.outputs.ami_id }}
