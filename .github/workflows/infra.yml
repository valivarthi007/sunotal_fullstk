name: Create infrastructure

on:
  push:
    branches:
    - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup `packer`
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: "latest"

      - name: build ami image
        id: packer_build
        run: |
          cd packer
          packer init .
          packer build .
          MANIFEST_PATH="$GITHUB_WORKSPACE/packer/packer-manifest.json"
          
          if [ -f "$MANIFEST_PATH" ]; then
            AMI_ID=$(grep -o '"artifact_id": *"[^"]*"' "$MANIFEST_PATH" | tail -n1 | cut -d '"' -f4 | cut -d ':' -f2)
            echo "Successfully found AMI ID: $AMI_ID"
            echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          else
            echo "::error::packer-manifest.json not found at $MANIFEST_PATH"
            exit 1
          fi

      - name: Setup `terraform`
        run: |
          wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update && sudo apt install terraform

      - name: Create infrastructure with above ami image
        env:
          TF_VAR_ami_id: ${{ steps.packer_build.outputs.ami_id }}
        run: |
          cd terraform
          terraform destroy -auto-approve
          terraform init
          echo "Deploying with AMI ID: $TF_VAR_ami_id"
          terraform plan -var="ami_id=${TF_VAR_ami_id}"
          terraform apply -auto-approve -var="ami_id=${TF_VAR_ami_id}"
