---
- name: Provision Jenkins CI/CD Server
  hosts: all
  become: true
  vars:
    node_version: "20"
    java_package: "openjdk-21-jdk"
    aws_cli_url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"

  tasks:
    - name: Clean up broken apt lists
      shell: rm -f /etc/apt/sources.list.d/*jenkins*.list /etc/apt/sources.list.d/hashicorp.list /etc/apt/sources.list.d/trivy.list

    - name: Update apt cache and install base dependencies
      shell: apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y apt-transport-https ca-certificates curl gnupg software-properties-common unzip git jq fontconfig {{ java_package }}

    # 2. Install Jenkins
    - name: Install Jenkins (Official Script)
      shell: |
        mkdir -p /etc/apt/keyrings
        wget -O /etc/apt/keyrings/jenkins-keyring.asc https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        echo "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/" | tee /etc/apt/sources.list.d/jenkins.list > /dev/null
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y jenkins
      args:
        creates: /usr/bin/jenkins

    - name: Ensure Jenkins service is started and enabled
      systemd:
        name: jenkins
        state: started
        enabled: yes

    # 3. Install Node.js 20 & pnpm
    - name: Install Node.js 20 & pnpm (Official Script)
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
        DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
        npm install -g pnpm@9
      args:
        creates: /usr/bin/pnpm

    # 4. Install HashiCorp Tools (Packer & Terraform)
    - name: Install HashiCorp Tools (Packer & Terraform) (Official Script)
      shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg --yes
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/hashicorp.list > /dev/null
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y terraform packer
      args:
        creates: /usr/bin/terraform

    # 5. Install Ansible
    - name: Install Ansible (Official Script)
      shell: |
        apt-add-repository -y ppa:ansible/ansible
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y ansible
      args:
        creates: /usr/bin/ansible

    # 6. Install AWS CLI
    - name: Install AWS CLI (Official Script)
      shell: |
        curl "{{ aws_cli_url }}" -o "/tmp/awscliv2.zip"
        unzip -q -o /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install --update
      args:
        creates: /usr/local/bin/aws

    # 7. Install Trivy
    - name: Install Trivy (Official Script)
      shell: |
        curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor -o /usr/share/keyrings/trivy.gpg --yes
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee /etc/apt/sources.list.d/trivy.list > /dev/null
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y trivy
      args:
        creates: /usr/bin/trivy

    # 8. Post-installation steps
    - name: Add jenkins user to sudoers (Optional - Allows Jenkins to run Terraform/Ansible commands seamlessly)
      lineinfile:
        path: /etc/sudoers.d/jenkins
        line: "jenkins ALL=(ALL) NOPASSWD: ALL"
        create: yes
        validate: 'visudo -cf %s'
        mode: 0440

    - name: Display initial Jenkins admin password location
      debug:
        msg: "Installation complete! The initial Jenkins admin password is at: /var/lib/jenkins/secrets/initialAdminPassword"
